# Nginx Configuration Template for SUBDOMAIN_SAAS_DEMO
# Replace 'yourdomain.com' with your actual domain.

server {
    listen 80;
    server_name *.yourdomain.com yourdomain.com;

    # Redirect all HTTP traffic to HTTPS (Recommended)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name *.yourdomain.com yourdomain.com;

    # SSL Certificate Paths (Generated by Certbot)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Pass real IP to Next.js
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Cache static assets at Nginx level
    location /_next/static {
        proxy_cache_valid 200 60m;
        proxy_pass http://localhost:3000;
    }
}
